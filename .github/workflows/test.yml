name: Test

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: examples-test-${{ github.ref }}
  cancel-in-progress: true

env:
  BUN_VERSION: "1.3.13"
  SWIFTLY_VERSION: "1.1.1"

jobs:
  linux-examples:
    name: Linux examples
    runs-on: ubuntu-24.04
    timeout-minutes: 75
    env:
      SWIFTTUI_EXAMPLES_SWIFTPM_SCRATCH: ${{ github.workspace }}/swift-tui-examples/.build/shared-swiftpm-linux
    steps:
      - name: Checkout examples
        uses: actions/checkout@v6
        with:
          path: swift-tui-examples
      - name: Install Linux example dependencies
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            ca-certificates \
            curl \
            git \
            libcurl4-openssl-dev \
            python3 \
            unzip
      - name: Cache Swiftly toolchain
        uses: actions/cache@v5
        with:
          path: |
            ~/.local/share/swiftly
            ~/.local/bin/swiftly
          key: ${{ runner.os }}-swiftly-${{ env.SWIFTLY_VERSION }}-${{ hashFiles('swift-tui-examples/.swift-version') }}
          restore-keys: |
            ${{ runner.os }}-swiftly-${{ env.SWIFTLY_VERSION }}-
      - name: Install swiftly and Swift toolchain
        shell: bash
        run: swift-tui-examples/Scripts/install_swift_toolchain_ci.sh swift-tui-examples/.swift-version
      - name: Cache SwiftPM
        uses: actions/cache@v5
        with:
          path: |
            swift-tui-examples/.build/shared-swiftpm-linux
            ~/.cache/org.swift.swiftpm
            ~/.swiftpm
          key: ${{ runner.os }}-examples-linux-swiftpm-${{ hashFiles('swift-tui-examples/**/Package.swift', 'swift-tui-examples/**/Package.resolved') }}
          restore-keys: |
            ${{ runner.os }}-examples-linux-swiftpm-
            ${{ runner.os }}-swiftpm-
      - name: Run Linux examples
        shell: bash
        working-directory: swift-tui-examples
        run: Scripts/check_examples_linux.sh --skip-clean

  web-examples:
    name: Web examples
    runs-on: macos-26
    timeout-minutes: 60
    steps:
      - name: Checkout examples
        uses: actions/checkout@v6
        with:
          path: swift-tui-examples
      - name: Cache Swiftly toolchain
        uses: actions/cache@v5
        with:
          path: ~/.swiftly
          key: ${{ runner.os }}-swiftly-${{ env.SWIFTLY_VERSION }}-${{ hashFiles('swift-tui-examples/.swift-version') }}
          restore-keys: |
            ${{ runner.os }}-swiftly-${{ env.SWIFTLY_VERSION }}-
      - name: Install swiftly and Swift toolchain
        shell: bash
        run: swift-tui-examples/Scripts/install_swift_toolchain_ci.sh swift-tui-examples/.swift-version
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}
      - name: Install WebExample build dependencies
        shell: bash
        run: brew install binaryen
      - name: Cache web build products
        uses: actions/cache@v5
        with:
          path: |
            swift-tui-examples/WebExample/TerminalApp/.build
            ~/.swiftpm
            ~/Library/Caches/org.swift.swiftpm
          key: ${{ runner.os }}-examples-web-swiftpm-${{ hashFiles('swift-tui-examples/WebExample/TerminalApp/Package.swift', 'swift-tui-examples/WebExample/TerminalApp/Package.resolved') }}
          restore-keys: |
            ${{ runner.os }}-examples-web-swiftpm-
            ${{ runner.os }}-swiftpm-
      - name: Cache Bun deps
        uses: actions/cache@v5
        with:
          path: |
            ~/.bun/install/cache
            swift-tui-examples/node_modules
          key: ${{ runner.os }}-examples-bun-${{ hashFiles('swift-tui-examples/bun.lock', 'swift-tui-examples/package.json', 'swift-tui-examples/WebExample/package.json') }}
          restore-keys: |
            ${{ runner.os }}-examples-bun-
      - name: Install wasm Swift SDK
        shell: bash
        run: |
          set -euo pipefail
          if ! swiftly run swift sdk list | grep -q "swift-6.3.1-RELEASE_wasm"; then
            swiftly run swift sdk install \
              https://download.swift.org/swift-6.3.1-release/wasm-sdk/swift-6.3.1-RELEASE/swift-6.3.1-RELEASE_wasm.artifactbundle.tar.gz \
              --checksum bd47baa20771f366d8beed7970afaa30742b2210097afd15f85427226d8f4cf2
          fi
      - name: Run web examples
        shell: bash
        working-directory: swift-tui-examples
        run: Scripts/check_examples_web.sh --skip-clean

  macos-examples:
    name: macOS examples
    runs-on: macos-26
    timeout-minutes: 45
    env:
      SWIFTTUI_EXAMPLES_SWIFTPM_SCRATCH: ${{ github.workspace }}/swift-tui-examples/.build/shared-swiftpm-macos
      SWIFTTUI_EXAMPLES_XCODE_DERIVED_DATA: ${{ github.workspace }}/swift-tui-examples/.build/xcode-derived-data
    steps:
      - name: Checkout examples
        uses: actions/checkout@v6
        with:
          path: swift-tui-examples
      - name: Cache Swiftly toolchain
        uses: actions/cache@v5
        with:
          path: ~/.swiftly
          key: ${{ runner.os }}-swiftly-${{ env.SWIFTLY_VERSION }}-${{ hashFiles('swift-tui-examples/.swift-version') }}
          restore-keys: |
            ${{ runner.os }}-swiftly-${{ env.SWIFTLY_VERSION }}-
      - name: Install swiftly and Swift toolchain
        shell: bash
        run: swift-tui-examples/Scripts/install_swift_toolchain_ci.sh swift-tui-examples/.swift-version
      - name: Cache macOS build products
        uses: actions/cache@v5
        with:
          path: |
            swift-tui-examples/.build/shared-swiftpm-macos
            swift-tui-examples/.build/xcode-derived-data
            ~/Library/Caches/org.swift.swiftpm
            ~/.swiftpm
          key: ${{ runner.os }}-examples-macos-build-${{ hashFiles('swift-tui-examples/**/Package.swift', 'swift-tui-examples/**/Package.resolved', 'swift-tui-examples/SwiftUIExample/SwiftUIExample.xcodeproj/project.pbxproj') }}
          restore-keys: |
            ${{ runner.os }}-examples-macos-build-
            ${{ runner.os }}-swiftpm-
      - name: Run macOS examples
        shell: bash
        working-directory: swift-tui-examples
        run: Scripts/check_examples_macos.sh --skip-clean
